const deB64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function abrir(){
  const erro = document.getElementById('erro');
  const senha = document.getElementById('senha').value;
  if(!senha){ erro.textContent='Digite a senha.'; return; }
  if(!(window.crypto && crypto.subtle)){ erro.textContent='Abra este link direto no Chrome ou Safari.'; return; }
  erro.textContent='Abrindo…';
  try{
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(senha), 'PBKDF2', false, ['deriveKey']);
    const chave = await crypto.subtle.deriveKey({name:'PBKDF2', salt:deB64(SALT), iterations:150000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const claro = await crypto.subtle.decrypt({name:'AES-GCM', iv:deB64(IV)}, chave, deB64(DADOS));
    const htmlStr = new TextDecoder().decode(claro);
    const quadro = document.getElementById('quadro');
    quadro.srcdoc = htmlStr;
    quadro.style.display='block';
    document.getElementById('cartao').style.display='none';
    document.title='OvoSmart · Gestão da Granja';
  }catch(e){
    erro.textContent='Senha incorreta — tente novamente.';
  }
}
document.getElementById('entrar').onclick=abrir;
document.getElementById('senha').addEventListener('keydown', e=>{ if(e.key==='Enter') abrir(); });
</script>
